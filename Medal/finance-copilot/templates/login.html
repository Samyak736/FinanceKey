<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finance Copilot · Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="brand">
          <strong>Finance Copilot</strong>
          <span>Login to upload and analyze your CSV files.</span>
        </div>
        <a class="pill" href="{{ url_for('auth.register') }}">Register</a>
      </div>
      <div class="panel" style="max-width: 520px; margin: 0 auto;">
        <h2>Sign in</h2>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('auth.login_post') }}">
          <label>
            Username
            <input type="text" name="username" autocomplete="username" />
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="current-password" />
          </label>
          <button type="submit">Log in</button>
        </form>
      </div>
    </div>
  </body>
</html>
